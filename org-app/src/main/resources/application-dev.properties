# 本地私密配置（数据库密码、邮箱授权码）放在 application-dev.local.properties，勿提交仓库
spring.config.import=optional:classpath:application-dev.local.properties

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/org_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:Voyager}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# QQ 邮箱 SMTP（587 + STARTTLS）
spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.default-encoding=UTF-8
spring.mail.from=${MAIL_FROM:${spring.mail.username}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.qq.com}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# 应用
app.base-url=${APP_BASE_URL:http://localhost:8080}

# 开发体验
spring.thymeleaf.cache=false
server.error.include-message=always

logging.level.com.skyline.org=DEBUG
logging.level.org.springframework.mail=INFO
logging.level.org.flywaydb=INFO
