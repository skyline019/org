# 生产环境：全部通过环境变量注入，不在配置文件中写密码

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.default-encoding=UTF-8
spring.mail.from=${MAIL_FROM:${spring.mail.username}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

app.base-url=${APP_BASE_URL}

# 生产环境防用户枚举；实时校验仅返回格式是否有效
app.auth.check.enumeration-safe=true

# 审计事件异步落库（仍同步写入 AUTH_AUDIT 日志与 Micrometer）
app.auth.audit.persist=true

# 管理员必须启用 MFA
app.auth.mfa.enabled=true
app.auth.mfa.enforce-for-roles=ROLE_ADMIN

# 分布式限流（生产默认 Redis；本地无 Redis 时可覆盖 app.auth.rate-limit.backend=memory）
app.auth.rate-limit.backend=redis

# 反向代理后启用可信 IP 解析（直连客户端不可伪造 X-Forwarded-For）
app.trusted-proxy.enabled=true

server.forward-headers-strategy=framework
server.servlet.session.cookie.secure=true
spring.web.error.include-message=never

logging.level.root=WARN
logging.level.com.skyline.org=INFO
logging.level.AUTH_AUDIT=INFO

management.endpoints.web.exposure.include=health,info,prometheus
management.health.mail.enabled=true

# Disable public API docs in production (SecurityConfig also requires ADMIN if re-enabled)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
