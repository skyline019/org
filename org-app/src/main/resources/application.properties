spring.application.name=org

# 本地默认 dev；生产环境用环境变量 SPRING_PROFILES_ACTIVE=prod 覆盖
spring.profiles.active=dev
# JPA（Flyway 先建表，再校验 schema）
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway（迁移由 FlywayMigrationConfig 在 JPA 启动前执行；保留 starter 以使用 BOM 依赖）
spring.flyway.enabled=false

# Session
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Static resource cache busting
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# Redis 默认不启用（限流使用 memory 后端）；启用 Redis 时使用 profile `redis` 或 prod 中取消 exclude
spring.autoconfigure.exclude=\
  org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.health.DataRedisHealthContributorAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.health.DataRedisReactiveHealthContributorAutoConfiguration
management.health.redis.enabled=false

# Profile groups (must not use spring.profiles.include inside profile-specific files)
spring.profiles.group.prod=redis

# Auth defaults
app.base-url=http://localhost:8080
app.auth.lock.max-attempts=5
app.auth.lock.duration=15m
app.auth.token.email-verification-expiry=24h
app.auth.token.password-reset-expiry=30m
app.auth.rate-limit.backend=memory
app.auth.rate-limit.login-per-minute=10
app.auth.rate-limit.register-per-minute=5
app.auth.rate-limit.reset-per-minute=5
app.auth.rate-limit.check-per-minute=30
app.auth.rate-limit.resend-per-minute=3
app.auth.rate-limit.admin-per-minute=30
app.auth.check.enumeration-safe=false
app.auth.check.availability-cache-ttl=5m
app.auth.audit.persist=false
app.auth.audit.retention=90d
app.trusted-proxy.enabled=false
app.auth.oauth2.enabled=false
app.auth.bootstrap-admin.enabled=false
app.auth.maintenance.login-attempt-retention=30d
app.auth.maintenance.expired-token-retention=7d

# Actuator (minimal exposure)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.health.mail.enabled=true

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
