# 测试库密码可放在 application-test.local.properties，或与 dev 共用 application-dev.local.properties
# 邮件相关属性由 GreenMail 集成测试的 @DynamicPropertySource 覆盖，避免 dev SMTP 污染
spring.config.import=optional:classpath:application-test.local.properties,optional:classpath:application-dev.local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/org_auth_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:Voyager}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=false
app.flyway.repair-on-migrate=true

app.base-url=http://localhost:8080
app.auth.lock.max-attempts=5
app.auth.lock.duration=15m
app.auth.rate-limit.check-per-minute=1000
app.auth.rate-limit.admin-per-minute=1000

spring.mail.host=localhost
spring.mail.properties.mail.smtp.auth=false
