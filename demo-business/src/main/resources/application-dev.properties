spring.config.import=optional:classpath:application-dev.local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/org_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:Voyager}
spring.datasource.password=${DB_PASSWORD}

spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.default-encoding=UTF-8
spring.mail.from=${MAIL_FROM:${spring.mail.username}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.qq.com}

spring.thymeleaf.cache=false
server.error.include-message=always

logging.level.com.skyline.org=DEBUG
