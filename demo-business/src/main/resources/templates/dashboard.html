<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{}, 'app')}">
<head>
    <title th:text="#{page.dashboard.title}">Dashboard</title>
</head>
<body>
<section th:fragment="content" class="dashboard-page">
    <div class="dashboard-panel auth-panel auth-panel--app">
        <header class="home-panel__header">
            <h1 class="home-panel__title" th:text="#{page.dashboard.heading}">Business dashboard</h1>
            <p class="home-panel__subtitle" th:text="#{page.dashboard.message}">You are logged in via org-auth-starter.</p>
        </header>

        <div class="dashboard-grid">
            <div class="dashboard-stat">
                <div class="dashboard-stat__label" th:text="#{page.dashboard.stat.module}">Module</div>
                <div class="dashboard-stat__value">demo-business</div>
            </div>
            <div class="dashboard-stat">
                <div class="dashboard-stat__label" th:text="#{page.home.stat.account}">Account</div>
                <div class="dashboard-stat__value" sec:authentication="name">user</div>
            </div>
            <div class="dashboard-stat">
                <div class="dashboard-stat__label" th:text="#{page.home.stat.status}">Status</div>
                <div class="dashboard-stat__value" th:text="#{page.home.stat.active}">Active</div>
            </div>
        </div>

        <div class="home-panel__actions">
            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-secondary" th:text="#{page.dashboard.logout}">Log out</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
