# 本地私密配置：优先 optional file 指向 org-app 的 dev.local（与 org-app 测试一致）；CI 使用 DB_PASSWORD 环境变量
spring.config.import=optional:classpath:application-test.local.properties,optional:file:../org-app/src/main/resources/application-dev.local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/org_auth_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:Voyager}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=false
app.flyway.repair-on-migrate=true

app.base-url=http://localhost:8081
app.auth.login-success-url=/dashboard

spring.mail.host=localhost
spring.mail.properties.mail.smtp.auth=false
