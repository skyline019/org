name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: org_auth_test
          MYSQL_USER: Voyager
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # MySQL service 已通过 MYSQL_DATABASE / MYSQL_USER 创建 org_auth_test 与 Voyager；
      # 表结构由测试启动时 FlywayMigrationConfig 迁移，无需额外 SQL 步骤。

      - name: Test
        env:
          DB_USERNAME: Voyager
          DB_PASSWORD: testpass
        run: ./mvnw verify -B

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: org-coverage/target/site/jacoco-aggregate/
