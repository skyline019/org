name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start CI services (Docker Compose)
        run: docker compose -f docker-compose.ci.yml up -d --wait

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test
        env:
          DB_USERNAME: Voyager
          DB_PASSWORD: testpass
        run: ./mvnw verify -B

      - name: E2E (Playwright)
        env:
          DB_USERNAME: Voyager
          DB_PASSWORD: testpass
        run: |
          ./mvnw -pl org-app -am install -DskipTests -B
          ./mvnw -f org-app/pom.xml -Pe2e exec:java -e \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.args="install --with-deps chromium"
          ./mvnw -pl org-app -am test -Pe2e -B

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: org-coverage/target/site/jacoco-aggregate/

      - name: Stop CI services
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: OWASP dependency-check
        run: ./mvnw -B org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7
