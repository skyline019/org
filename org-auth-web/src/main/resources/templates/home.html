<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{}, 'app')}">
<head>
    <title th:text="#{page.home.title}">Home</title>
</head>
<body>
<section th:fragment="content" class="home-page">
    <div class="home-panel auth-panel auth-panel--app">
        <header class="home-panel__header">
            <h1 class="home-panel__title">
                <span th:text="#{page.home.welcome}">Welcome,</span>
                <span class="home-panel__title-accent" sec:authentication="name">user</span>
            </h1>
            <p class="home-panel__subtitle" th:text="#{page.home.placeholder}">Placeholder</p>
        </header>

        <div class="dashboard-grid">
            <div class="dashboard-stat">
                <div class="dashboard-stat__label" th:text="#{page.home.stat.account}">Account</div>
                <div class="dashboard-stat__value" sec:authentication="name">user</div>
            </div>
            <div class="dashboard-stat" sec:authorize="hasRole('USER')">
                <div class="dashboard-stat__label" th:text="#{page.home.stat.role}">Role</div>
                <div class="dashboard-stat__value">USER</div>
            </div>
            <div class="dashboard-stat">
                <div class="dashboard-stat__label" th:text="#{page.home.stat.status}">Status</div>
                <div class="dashboard-stat__value" th:text="#{page.home.stat.active}">Active</div>
            </div>
        </div>

        <div class="home-panel__actions">
            <p sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/users}" th:text="#{page.home.admin}">User management</a>
            </p>
            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-secondary" th:text="#{page.home.logout}">Log out</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
