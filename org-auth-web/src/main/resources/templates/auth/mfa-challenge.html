<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{}, 'auth')}">
<head>
    <title th:text="#{page.mfa.challenge.title}">Two-factor authentication</title>
</head>
<body>
<section th:fragment="content">
    <div class="auth-card">
        <div class="auth-panel auth-panel--auth">
            <h1 class="auth-card__title" th:text="#{page.mfa.challenge.heading}">Two-factor authentication</h1>
            <p class="auth-card__subtitle" th:text="#{page.mfa.challenge.subtitle}">Enter the code from your authenticator app</p>

            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <form th:action="@{/auth/mfa/challenge}" method="post" class="auth-form" autocomplete="off">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="code" th:text="#{page.mfa.code}">Authentication code</label>
                    <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required autocomplete="one-time-code"/>
                </div>
                <button type="submit" class="btn btn-primary" th:text="#{page.mfa.challenge.submit}">Verify</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
