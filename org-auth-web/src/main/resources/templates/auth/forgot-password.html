<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{::pageScripts}, 'auth')}">
<head>
    <title th:text="#{page.forgot.title}">Forgot password</title>
</head>
<body>
<section th:fragment="content">
    <div class="auth-card">
        <div class="auth-panel auth-panel--auth">
            <h1 class="auth-card__title" th:text="#{page.forgot.heading}">Forgot password</h1>
            <p class="auth-card__subtitle" th:text="#{page.forgot.description}">Description</p>

            <form th:action="@{/auth/forgot-password}" th:object="${forgotPasswordRequest}" method="post"
                  class="auth-form" autocomplete="off">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div th:if="${#fields.hasErrors('email')}" class="alert alert-error">
                    <p th:each="err : ${#fields.errors('email')}" th:text="${err}"></p>
                </div>

                <div class="form-group">
                    <label for="email" th:text="#{page.forgot.email}">Email</label>
                    <input type="email" id="email" th:field="*{email}" required autocomplete="off"/>
                    <span class="field-hint error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                </div>
                <button type="submit" class="btn btn-primary" th:text="#{page.forgot.submit}">Send reset email</button>
            </form>

            <p class="auth-links">
                <a th:href="@{/login}" th:text="#{page.forgot.back}">Back to sign in</a>
            </p>
        </div>
    </div>
</section>
<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
