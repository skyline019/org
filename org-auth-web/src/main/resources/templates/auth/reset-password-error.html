<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="#{page.reset.error.title}">Reset link invalid</title>
</head>
<body>
<section>
    <h1 th:text="#{page.reset.error.heading}">Reset link invalid</h1>
    <div class="alert alert-error" th:text="${errorMessage}">Error</div>
    <p class="auth-links">
        <a th:href="@{/auth/forgot-password}" th:text="#{page.reset.error.retry}">Request a new reset link</a>
        <span>|</span>
        <a th:href="@{/login}" th:text="#{page.forgot.back}">Back to sign in</a>
    </p>
</section>
</body>
</html>
