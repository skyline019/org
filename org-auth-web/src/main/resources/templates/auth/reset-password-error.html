<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{}, 'auth')}">
<head>
    <title th:text="#{page.reset.error.title}">Reset link invalid</title>
</head>
<body>
<section th:fragment="content">
    <div class="auth-card">
        <div class="auth-panel auth-panel--auth auth-panel--status">
            <div class="status-icon status-icon--error" aria-hidden="true">!</div>
            <h1 class="auth-card__title" th:text="#{page.reset.error.heading}">Reset link invalid</h1>
            <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <p class="auth-links">
                <a th:href="@{/auth/forgot-password}" th:text="#{page.reset.error.retry}">Request a new reset link</a>
                <span class="auth-links__sep">|</span>
                <a th:href="@{/login}" th:text="#{page.forgot.back}">Back to sign in</a>
            </p>
        </div>
    </div>
</section>
</body>
</html>
