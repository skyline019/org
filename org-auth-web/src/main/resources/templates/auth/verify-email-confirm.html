<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{::pageScripts}, 'auth')}">
<head>
    <title th:text="#{page.verify.confirm.title}">Confirm email verification</title>
</head>
<body>
<section th:fragment="content">
    <div class="auth-card">
        <div class="auth-panel auth-panel--auth">
            <div class="status-icon status-icon--info" aria-hidden="true">✓</div>
            <h1 class="auth-card__title" th:text="#{page.verify.confirm.heading}">Confirm email verification</h1>
            <p class="auth-card__subtitle" th:text="#{page.verify.confirm.description}">Description</p>

            <form th:action="@{/auth/verify-email}" method="post" class="auth-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="token" th:value="${token}"/>
                <button type="submit" class="btn btn-primary" th:text="#{page.verify.confirm.submit}">Confirm verification</button>
            </form>

            <p class="auth-links">
                <a th:href="@{/login}" th:text="#{page.verify.confirm.back}">Back to sign in</a>
            </p>
        </div>
    </div>
</section>
<th:block th:fragment="pageScripts"></th:block>
</body>
</html>
