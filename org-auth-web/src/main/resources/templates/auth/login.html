<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="#{page.login.title}">Sign in</title>
</head>
<body>
<section>
    <h1 th:text="#{page.login.heading}">Sign in</h1>

    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <form th:action="@{/login}" method="post" class="auth-form" autocomplete="off">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
            <label for="username" th:text="#{page.login.username}">Username</label>
            <input type="text" id="username" name="username" required autocomplete="off"/>
        </div>
        <div class="form-group">
            <label for="password" th:text="#{page.login.password}">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn btn-primary" th:text="#{page.login.submit}">Sign in</button>
    </form>

    <p class="auth-links">
        <a th:href="@{/register}" th:text="#{page.login.register}">Create account</a>
        <span>|</span>
        <a th:href="@{/auth/forgot-password}" th:text="#{page.login.forgot}">Forgot password</a>
    </p>
</section>
</body>
</html>
