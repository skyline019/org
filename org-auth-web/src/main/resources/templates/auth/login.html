<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{}, 'auth')}">
<head>
    <title th:text="#{page.login.title}">Sign in</title>
</head>
<body>
<section th:fragment="content">
    <div class="auth-card">
        <div class="auth-panel auth-panel--auth">
            <h1 class="auth-card__title" th:text="#{page.login.heading}">Sign in</h1>
            <p class="auth-card__subtitle" th:text="#{page.auth.login.subtitle}">Enter your credentials</p>

            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

            <form th:action="@{/login}" method="post" class="auth-form" autocomplete="off">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="username" th:text="#{page.login.username}">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="off"/>
                </div>
                <div class="form-group">
                    <label for="password" th:text="#{page.login.password}">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password"/>
                </div>
                <button type="submit" class="btn btn-primary" th:text="#{page.login.submit}">Sign in</button>
            </form>

            <div th:if="${oauthProviders != null and !oauthProviders.isEmpty()}" class="oauth-divider">
                <span th:text="#{page.login.oauth.divider}">Or continue with</span>
            </div>
            <div th:if="${oauthProviders != null}" class="oauth-buttons">
                <a th:each="provider : ${oauthProviders}"
                   th:href="@{/oauth2/authorization/{id}(id=${provider})}"
                   class="btn btn-oauth"
                   th:text="#{page.login.oauth.provider(${provider})}">OAuth</a>
            </div>

            <p class="auth-links">
                <a th:href="@{/register}" th:text="#{page.login.register}">Create account</a>
                <span class="auth-links__sep">|</span>
                <a th:href="@{/auth/forgot-password}" th:text="#{page.login.forgot}">Forgot password</a>
            </p>
        </div>
    </div>
</section>
</body>
</html>
