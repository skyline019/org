<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="#{page.verify.pending.title}">Verify email</title>
</head>
<body>
<section>
    <h1 th:text="#{page.verify.pending.heading}">Verify your email</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="alert alert-info">
        <span th:text="#{page.verify.pending.sent}">Registration successful! We sent a verification email to</span>
        <strong th:text="${registeredEmail}">you@example.com</strong>
    </div>

    <ol class="verify-steps" th:with="mailSubject=#{auth.mail.verify.subject}">
        <li th:text="#{page.verify.step1(${mailSubject})}">Step 1</li>
        <li th:text="#{page.verify.step2}">Step 2</li>
        <li th:text="#{page.verify.step3}">Step 3</li>
        <li th:text="#{page.verify.step4}">Step 4</li>
    </ol>

    <p class="verify-hint" th:text="#{page.verify.hint}">Hint</p>

    <form th:action="@{/auth/resend-verification}" method="post" class="auth-form inline-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="email" th:value="${registeredEmail}"/>
        <button type="submit" class="btn btn-secondary" th:text="#{page.verify.resend}">Resend verification email</button>
    </form>

    <p class="auth-links">
        <a th:href="@{/login}" class="btn btn-primary" th:text="#{page.verify.login}">Go to sign in after verification</a>
    </p>
    <p class="auth-links">
        <a th:href="@{/register}" th:text="#{page.verify.back}">Back to register</a>
    </p>
</section>
</body>
</html>
