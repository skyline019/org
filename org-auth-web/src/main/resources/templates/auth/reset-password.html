<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{::pageScripts}, 'auth')}">
<head>
    <title th:text="#{page.reset.title}">Reset password</title>
</head>
<body>
<section th:fragment="content">
    <div class="auth-card">
        <div class="auth-panel auth-panel--auth">
            <h1 class="auth-card__title" th:text="#{page.reset.heading}">Reset password</h1>
            <p class="auth-card__subtitle" th:text="#{page.auth.reset.subtitle}">Choose a new password</p>

            <form th:action="@{/auth/reset-password}" th:object="${resetPasswordRequest}" method="post"
                  class="auth-form" autocomplete="off">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{token}"/>

                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-error">
                    <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                </div>

                <div class="form-group">
                    <label for="password" th:text="#{page.reset.password}">New password</label>
                    <input type="password" id="password" th:field="*{password}" required autocomplete="new-password"
                           data-check="password"/>
                    <span class="field-hint error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                    <ul class="password-rules" id="password-rules"></ul>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" th:text="#{page.reset.confirm}">Confirm new password</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required
                           autocomplete="new-password"/>
                    <span class="field-hint error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
                    <span class="field-hint" id="confirm-hint"></span>
                </div>

                <button type="submit" class="btn btn-primary" th:text="#{page.reset.submit}">Reset password</button>
            </form>
        </div>
    </div>
</section>
<th:block th:fragment="pageScripts">
    <script th:src="@{/js/auth/validation.js}" defer></script>
</th:block>
</body>
</html>
