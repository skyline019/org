<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{}, 'auth')}">
<head>
    <title th:text="#{page.mfa.setup.title}">Set up two-factor authentication</title>
</head>
<body>
<section th:fragment="content">
    <div class="auth-card">
        <div class="auth-panel auth-panel--auth">
            <h1 class="auth-card__title" th:text="#{page.mfa.setup.heading}">Set up two-factor authentication</h1>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

            <div th:if="${alreadyEnrolled}">
                <p class="auth-card__subtitle" th:text="#{page.mfa.setup.enabled}">MFA is enabled for your account.</p>
                <form th:action="@{/auth/mfa/disable}" method="post" class="auth-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <label for="code" th:text="#{page.mfa.code}">Authentication code</label>
                        <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required/>
                    </div>
                    <button type="submit" class="btn btn-secondary" th:text="#{page.mfa.setup.disable}">Disable MFA</button>
                </form>
            </div>

            <div th:unless="${alreadyEnrolled}">
                <p class="auth-card__subtitle" th:if="${mandatory}" th:text="#{page.mfa.setup.mandatory}">MFA is required for your account role. Complete setup to continue.</p>
                <p class="auth-card__subtitle" th:unless="${mandatory}" th:text="#{page.mfa.setup.subtitle}">Scan the QR code with your authenticator app, then enter a code to confirm.</p>
                <div class="mfa-qr" th:if="${qrCodeDataUri}">
                    <img th:src="${qrCodeDataUri}" alt="MFA QR code" width="200" height="200"/>
                </div>
                <p class="mfa-secret" th:if="${secret}">
                    <span th:text="#{page.mfa.setup.manual}">Manual entry key:</span>
                    <code th:text="${secret}">SECRET</code>
                </p>
                <form th:action="@{/auth/mfa/enable}" method="post" class="auth-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <label for="code" th:text="#{page.mfa.code}">Authentication code</label>
                        <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required/>
                    </div>
                    <button type="submit" class="btn btn-primary" th:text="#{page.mfa.setup.enable}">Enable MFA</button>
                </form>
            </div>

            <p class="auth-links" th:unless="${mandatory}">
                <a th:href="@{/home}" th:text="#{page.mfa.setup.back}">Back to home</a>
            </p>
        </div>
    </div>
</section>
</body>
</html>
