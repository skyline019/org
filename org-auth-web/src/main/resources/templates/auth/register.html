<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content}, ~{::pageScripts}, 'auth')}">
<head>
    <title th:text="#{page.register.title}">Register</title>
</head>
<body>
<section th:fragment="content">
    <div class="auth-card">
        <div class="auth-panel auth-panel--auth">
            <h1 class="auth-card__title" th:text="#{page.register.heading}">Register</h1>
            <p class="auth-card__subtitle" th:text="#{page.auth.register.subtitle}">Create your account</p>

            <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="auth-form" id="registerForm"
                  autocomplete="off">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-error">
                    <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                </div>

                <div class="form-group">
                    <label for="username" th:text="#{page.register.username}">Username</label>
                    <input type="text" id="username" th:field="*{username}" required autocomplete="username"
                           data-check="username"/>
                    <span class="field-hint error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                    <span class="field-hint" id="username-hint"></span>
                </div>

                <div class="form-group">
                    <label for="email" th:text="#{page.register.email}">Email</label>
                    <input type="email" id="email" th:field="*{email}" required autocomplete="email" data-check="email"/>
                    <span class="field-hint error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                    <span class="field-hint" id="email-hint"></span>
                </div>

                <div class="form-group">
                    <label for="password" th:text="#{page.register.password}">Password</label>
                    <input type="password" id="password" th:field="*{password}" required autocomplete="new-password"
                           data-check="password"/>
                    <span class="field-hint error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                    <ul class="password-rules" id="password-rules"></ul>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" th:text="#{page.register.confirm}">Confirm password</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required
                           autocomplete="new-password"/>
                    <span class="field-hint error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
                    <span class="field-hint" id="confirm-hint"></span>
                </div>

                <button type="submit" class="btn btn-primary" th:text="#{page.register.submit}">Register</button>
            </form>

            <p class="auth-links">
                <a th:href="@{/login}" th:text="#{page.register.login}">Already have an account? Sign in</a>
            </p>
        </div>
    </div>
</section>
<th:block th:fragment="pageScripts">
    <script th:src="@{/js/auth/validation.js}" defer></script>
</th:block>
</body>
</html>
